<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrthoVision — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════
   DASHBOARD
═══════════════════════════════════ */
#pageDashboard{flex-direction:column;min-height:100vh;background:#080a10;overflow-y:auto;}
.dash-nav{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:rgba(19,22,30,.96);border-bottom:1px solid #1e2230;flex-shrink:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);}
.dash-logo{font-family:"Space Mono",monospace;font-size:13px;color:#e2e6f0;display:flex;align-items:center;gap:9px;}
.dash-logo span{color:#4f8ef7;}
.dash-logo-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 7px #4ade80;}
.dash-user{display:flex;align-items:center;gap:10px;}
.dash-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#3a7de0);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;}
.dash-avatar img{width:100%;height:100%;object-fit:cover;}
.dash-uname{font-size:12px;font-weight:500;color:#e2e6f0;}
.dash-signout{font-size:11px;color:#8892aa;background:transparent;border:1px solid #1e2230;border-radius:5px;padding:3px 10px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .12s;}
.dash-signout:hover{border-color:#f87171;color:#f87171;}
.dash-body{flex:1;padding:42px 36px;max-width:1200px;margin:0 auto;width:100%;}
.dash-greeting{margin-bottom:38px;}
.dash-greeting-text{font-family:"Inter",sans-serif;font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-.025em;color:#fff;margin-bottom:5px;}
.dash-greeting-text em{font-style:normal;color:#4f8ef7;}
.dash-greeting-sub{font-size:13px;color:#8892aa;}
.dash-stats{display:flex;gap:14px;margin-bottom:32px;flex-wrap:wrap;}
.dash-stat{flex:1;min-width:130px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px 20px;}
.ds-val{font-family:"Space Mono",monospace;font-size:26px;font-weight:700;color:#e2e6f0;}
.ds-lbl{font-size:11px;color:#8892aa;margin-top:3px;letter-spacing:.04em;}
.dash-drive-pill{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.15);font-size:11px;color:#4ade80;margin-bottom:24px;width:fit-content;}
.dash-drive-pill .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.dash-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.dash-sec-title{font-size:11px;font-weight:700;color:#8892aa;letter-spacing:.1em;text-transform:uppercase;}
.dash-sec-actions{display:flex;gap:8px;align-items:center;}
.dash-refresh{background:transparent;border:1px solid #1e2230;color:#8892aa;border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.dash-refresh:hover{border-color:#4f8ef7;color:#4f8ef7;}
.dash-new-btn{display:flex;align-items:center;gap:7px;padding:8px 20px;border-radius:8px;background:linear-gradient(135deg,#4f8ef7,#3a7de0);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;box-shadow:0 2px 14px rgba(79,142,247,.3);transition:all .15s;}
.dash-new-btn:hover{transform:translateY(-1px);box-shadow:0 4px 22px rgba(79,142,247,.45);}
.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.case-new{border:2px dashed rgba(79,142,247,.22);border-radius:14px;padding:36px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .18s;color:#8892aa;background:rgba(79,142,247,.02);min-height:170px;}
.case-new:hover{border-color:#4f8ef7;color:#4f8ef7;background:rgba(79,142,247,.06);}
.case-new-icon{font-size:30px;opacity:.45;}
.case-new-lbl{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.case-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;cursor:pointer;transition:all .18s;position:relative;display:flex;flex-direction:column;gap:11px;min-height:170px;}
.case-card:hover{border-color:rgba(79,142,247,.38);background:rgba(79,142,247,.04);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3);}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;}
.cc-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(79,142,247,.22),rgba(79,142,247,.07));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cc-del{width:24px;height:24px;border-radius:5px;border:none;background:transparent;color:#3a4060;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s;opacity:0;}
.case-card:hover .cc-del{opacity:1;}
.cc-del:hover{color:#f87171;background:rgba(248,113,113,.1);}
.cc-name{font-size:13px;font-weight:600;color:#e2e6f0;word-break:break-word;line-height:1.35;}
.cc-meta{font-size:10px;color:#8892aa;line-height:1.55;}
.cc-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 7px;border-radius:8px;background:rgba(79,142,247,.1);color:#4f8ef7;border:1px solid rgba(79,142,247,.18);margin-top:4px;width:fit-content;}
.cases-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:52px;color:#8892aa;font-size:12px;grid-column:1/-1;}
.cases-spinner{width:16px;height:16px;border:2px solid #1e2230;border-top-color:#4f8ef7;border-radius:50%;animation:casespin .8s linear infinite;}
@keyframes casespin{to{transform:rotate(360deg)}}
.cases-empty{grid-column:1/-1;text-align:center;padding:60px 24px;color:#8892aa;font-size:12px;line-height:1.8;}
.cases-empty-icon{font-size:36px;margin-bottom:10px;opacity:.2;}


/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#1a1e2a;border:1px solid #1e2230;border-radius:10px;padding:12px 18px;font-size:12px;color:#e2e6f0;box-shadow:0 8px 32px rgba(0,0,0,.7);display:flex;align-items:center;gap:10px;max-width:320px;pointer-events:none;opacity:0;transform:translateY(16px);transition:opacity .25s,transform .25s;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.toast-success{border-color:#4ade80;}.toast.toast-info{border-color:#4f8ef7;}
.toast-icon{font-size:16px;flex-shrink:0;}

</style>
</head>
<body style="margin:0;padding:0;background:#080a10;color:#e2e6f0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;">

<nav class="dash-nav">
  <div class="dash-logo">
    <div style="width:27px;height:27px;border-radius:7px;background:linear-gradient(135deg,#4f8ef7,#3a7de0);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">🦷</div>
    Ortho<span>Vision</span>
    <div class="dash-logo-dot"></div>
  </div>
  <div class="dash-user">
    <div class="dash-avatar" id="dashAvatar">?</div>
    <span class="dash-uname" id="dashUname"></span>
    <button class="dash-signout" onclick="appSignOut()">Sign out</button>
  </div>
</nav>

<div class="dash-body">
  <div class="dash-greeting">
    <div class="dash-greeting-text">Hello, <em id="dashFirstName">Doctor</em> 👋</div>
    <div class="dash-greeting-sub">Your OrthoVision workspace</div>
  </div>

  <div class="dash-stats">
    <div class="dash-stat">
      <div class="ds-val" id="dashStatCases">—</div>
      <div class="ds-lbl">Saved Cases</div>
    </div>
    <div class="dash-stat">
      <div class="ds-val" id="dashStatRecent" style="font-size:16px;padding-top:4px;">—</div>
      <div class="ds-lbl">Last Modified</div>
    </div>
    <div class="dash-stat">
      <div class="ds-val" style="font-size:20px;color:#4ade80;">✓</div>
      <div class="ds-lbl">Drive Connected</div>
    </div>
  </div>

  <div class="dash-drive-pill" id="dashDrivePill" style="display:none">
    <div class="dot"></div>
    Connected to Google Drive &nbsp;·&nbsp; Folder: <strong style="color:#e2e6f0;margin-left:4px;">OrthoVision Cases</strong>
  </div>

  <div class="dash-sec-hdr">
    <div class="dash-sec-title">My Cases</div>
    <div class="dash-sec-actions">
      <button class="dash-refresh" onclick="dashLoadCases()" title="Refresh">↻</button>
      <button class="dash-new-btn" onclick="openNewCase()">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
        + New Case
      </button>
    </div>
  </div>

  <div class="cases-grid" id="dashCasesGrid">
    <div class="cases-loading"><div class="cases-spinner"></div>Loading your cases…</div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/shared.js"></script>
<script src="js/auth.js"></script>
<script>
const DRIVE_API = 'https://www.googleapis.com/drive/v3';
const APP_FOLDER = 'OrthoVision Cases';
const APP_PREFIX = 'ovcase_';

// ── Override onSignedIn for dashboard context ──────────────────────
function onSignedIn(profile) {
  populateDashboardProfile(profile);
  document.getElementById('dashDrivePill').style.display = 'flex';
  dashLoadCases();
}

function populateDashboardProfile(profile) {
  const firstName = (profile.given_name || profile.name || 'Doctor').split(' ')[0];
  document.getElementById('dashFirstName').textContent = firstName;
  document.getElementById('dashUname').textContent = profile.email || profile.name || '';
  const av = document.getElementById('dashAvatar');
  if (profile.picture) av.innerHTML = '<img src="' + profile.picture + '" alt="" style="width:100%;height:100%;object-fit:cover;">';
  else av.textContent = (profile.name || '?')[0].toUpperCase();
}

// ── Drive: get/create OrthoVision folder ──────────────────────────
async function appGetFolder() {
  if (appFolderId) return appFolderId;
  const q = "name='" + APP_FOLDER + "' and mimeType='application/vnd.google-apps.folder' and trashed=false";
  const r = await fetch(DRIVE_API + '/files?q=' + encodeURIComponent(q) + '&fields=files(id)&spaces=drive', {
    headers: { Authorization: 'Bearer ' + appAccessToken }
  });
  const d = await r.json();
  if (d.files && d.files.length) { appFolderId = d.files[0].id; return appFolderId; }
  const cr = await fetch(DRIVE_API + '/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + appAccessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: APP_FOLDER, mimeType: 'application/vnd.google-apps.folder' })
  });
  appFolderId = (await cr.json()).id;
  return appFolderId;
}

// ── Load case list ─────────────────────────────────────────────────
async function dashLoadCases() {
  const grid = document.getElementById('dashCasesGrid');
  if (!appAccessToken) { window.location.href = 'index.html'; return; }
  grid.innerHTML = '<div class="cases-loading"><div class="cases-spinner"></div>Loading your cases…</div>';
  try {
    const fid = await appGetFolder();
    const q = "'" + fid + "' in parents and trashed=false and name contains '" + APP_PREFIX + "'";
    const r = await fetch(DRIVE_API + '/files?q=' + encodeURIComponent(q) + '&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc&spaces=drive', {
      headers: { Authorization: 'Bearer ' + appAccessToken }
    });
    const d = await r.json();
    const files = d.files || [];
    const sc = document.getElementById('dashStatCases');
    if (sc) sc.textContent = files.length;
    const sr = document.getElementById('dashStatRecent');
    if (sr) sr.textContent = files.length ? new Date(files[0].modifiedTime).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : 'None yet';

    grid.innerHTML = '';
    // + New Case card
    const nc = document.createElement('div');
    nc.className = 'case-new';
    nc.innerHTML = '<div class="case-new-icon">＋</div><div class="case-new-lbl">New Case</div><div style="font-size:10px;margin-top:2px;opacity:.6;">Start fresh</div>';
    nc.onclick = openNewCase;
    grid.appendChild(nc);

    if (!files.length) {
      const em = document.createElement('div');
      em.className = 'cases-empty'; em.style.gridColumn = 'span 2';
      em.innerHTML = '<div class="cases-empty-icon">🗂</div>No saved cases yet.<br>Click <strong style="color:#4f8ef7">+ New Case</strong> to create your first.';
      grid.appendChild(em);
    } else {
      files.forEach(f => {
        const nm = f.name.replace(APP_PREFIX,'').replace('.json','').replace(/_/g,' ');
        const dt = f.modifiedTime ? new Date(f.modifiedTime).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        const card = document.createElement('div');
        card.className = 'case-card';
        card.innerHTML = `<div class="cc-top">
          <div class="cc-icon">🗂️</div>
          <button class="cc-del" onclick="event.stopPropagation();dashDeleteCase('${f.id}',this.closest('.case-card'),'${nm.replace(/'/g,"\\'")}')" title="Delete">✕</button>
        </div>
        <div class="cc-name">${nm}</div>
        <div class="cc-meta">Last modified: ${dt}</div>
        <div class="cc-badge"><svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M6.28 3L1 12.27 6.28 21h11.44L23 12.27 17.72 3H6.28z"/></svg>Saved to Drive</div>`;
        card.addEventListener('click', () => openExistingCase(f.id, nm));
        grid.appendChild(card);
      });
    }
  } catch(err) {
    grid.innerHTML = '<div class="cases-empty"><div class="cases-empty-icon">⚠️</div>Failed to load.<br><span style="color:#f87171;font-size:10px;">' + err.message + '</span></div>';
    showToast('Failed to load cases: ' + err.message, '❌', 'toast-info', 4000);
  }
}

async function dashDeleteCase(fileId, cardEl, name) {
  if (!confirm('Delete "' + name + '" from Google Drive?\nThis cannot be undone.')) return;
  try {
    await fetch(DRIVE_API + '/files/' + fileId, { method:'DELETE', headers:{ Authorization:'Bearer '+appAccessToken } });
    cardEl.remove();
    showToast('"' + name + '" deleted', '🗑', 'toast-info', 2500);
    dashLoadCases();
  } catch(err) { showToast('Delete failed: ' + err.message, '❌', 'toast-info', 3500); }
}

// ── Navigation ────────────────────────────────────────────────────
function openNewCase() {
  sessionStorage.setItem('ov_new_case', '1');
  sessionStorage.removeItem('ov_open_case');
  window.location.href = 'editor.html';
}

function openExistingCase(fileId, caseName) {
  sessionStorage.setItem('ov_open_case', JSON.stringify({ fileId, caseName }));
  sessionStorage.removeItem('ov_new_case');
  window.location.href = 'editor.html';
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const hasSession = await restoreSession();
  if (!hasSession) { window.location.href = 'index.html'; return; }
  populateDashboardProfile(appProfile);
  document.getElementById('dashDrivePill').style.display = 'flex';
  dashLoadCases();
});
</script>
</body>
</html>
